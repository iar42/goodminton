<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#16a34a">
  <title>Goodminton</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0fdf4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #111827;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 36px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .shuttle { font-size: 3rem; margin-bottom: 12px; }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: #15803d;
      margin-bottom: 8px;
    }

    .intro {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1fae5;
      border-radius: 10px;
      font-size: 1rem;
      color: #111827;
      outline: none;
      transition: border-color 0.15s;
      text-align: center;
      letter-spacing: 0.03em;
    }

    input[type="text"]:focus { border-color: #16a34a; }
    input[type="text"]::placeholder { color: #9ca3af; letter-spacing: normal; }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:active { opacity: 0.85; }

    .error {
      font-size: 0.85rem;
      color: #dc2626;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="shuttle">🏸</div>
    <h1>Goodminton</h1>
    <p class="intro">Enter your team's code to see who's showing up this week.</p>

    <div class="form-group">
      <input type="text" id="slug" placeholder="team-code" autocomplete="off"
             autocapitalize="none" spellcheck="false"
             onkeydown="if(event.key==='Enter') goToTeam()">
      <button onclick="goToTeam()">Go to team page</button>
      <div class="error" id="err">Please enter a team code.</div>
    </div>
  </div>

  <script>
    function goToTeam() {
      const slug = document.getElementById('slug').value.trim();
      if (!slug) {
        document.getElementById('err').style.display = 'block';
        return;
      }
      window.location.href = '/t/' + encodeURIComponent(slug);
    }

    document.getElementById('slug').focus();
  </script>
</body>
</html>
